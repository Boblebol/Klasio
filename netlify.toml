# Configuration Netlify pour Klasio
# Documentation : https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  # Pas de build : le site est un unique fichier statique.
  command = ""

[build.environment]
  NODE_VERSION = "20"

# En-têtes de sécurité appliqués à toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP permissive pour supporter jsPDF CDN + Google Fonts.
    # À durcir en phase 2 quand on hébergera les assets localement.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'"

# Cache long sur les ressources immuables (aucune pour l'instant — à venir)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirection propre des anciennes URLs vers la racine (au cas où)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = false
